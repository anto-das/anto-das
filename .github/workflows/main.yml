name: WakaTime Readme Update

on:
  schedule:
    - cron: "0 * * * *" # প্রতি ঘণ্টায় একবার চলবে
  workflow_dispatch: # ম্যানুয়ালি রান করার সুবিধা

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install Requests
        run: pip install requests

      - name: Fetch WakaTime Stats and Update README
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_SECRET_KEY }}
        run: |
          python <<EOF
          import requests, json

          url = "https://wakatime.com/api/v1/users/current/stats/last_7_days"
          headers = {"Authorization": f"Bearer ${WAKATIME_API_KEY}"}

          r = requests.get(url, headers=headers)
          data = r.json()

          total = data.get("data", {}).get("total_seconds", 0)
          hours = round(total / 3600, 2)

          readme_path = "README.md"
          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          new_line = f"**Last 7 Days Coding Time:** {hours} hours"

          import re
          content = re.sub(r"\*\*Last 7 Days Coding Time:\*\*.*", new_line, content)

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(content)

          print("README updated with latest WakaTime hours!")
          EOF
